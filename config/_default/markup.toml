# -- Markup --
# These settings are required for the theme to function.

[goldmark]
  [goldmark.renderHooks]
    [goldmark.renderHooks.link]
      useEmbedded = 'always'
    [goldmark.renderHooks.image]
      useEmbedded = 'always'
  [goldmark.extensions]
    [goldmark.extensions.passthrough]
      enable = true
      [goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['$', '$']]

[highlight]
  noClasses = false

[tableOfContents]
  startLevel = 2
  endLevel = 4
